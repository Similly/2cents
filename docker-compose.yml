services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: twocents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d twocents"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/twocents?schema=public}
      UPLOAD_DIR: ${DOCKER_UPLOAD_DIR:-/app/public/uploads}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - proxy
    volumes:
      - uploads_data:/app/public/uploads


volumes:
  postgres_data:
  uploads_data:

networks:
  proxy:
    external: true
    name: ${PROXY_DOCKER_NETWORK:-proxy_default}
